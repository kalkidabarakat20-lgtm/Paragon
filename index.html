<!DOCTYPE html>
<html lang="en" data-theme="paper" data-accent="crimson">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0" />
<meta name="theme-color" content="#F2E5C8" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="PARAGON" />
<meta name="description" content="PARAGON — a heroic training system. Forge strength, build the streak, write your origin story." />
<title>PARAGON · Hero Training System</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Anton&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet" />
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<script>if("serviceWorker" in navigator){addEventListener("load",function(){navigator.serviceWorker.register("sw.js").catch(function(){});});}</script>
<!-- ===== CLOUD SYNC (Supabase) ===== -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  /* =======================================================================
     PARAGON CLOUD CONFIG  —  paste your two Supabase values between the quotes.
     Until you do, the app simply runs offline-only (no harm). Once filled in,
     a "Cloud Sync" panel appears in the Hero tab.
     ======================================================================= */
  window.SUPABASE_URL = "YOUR_SUPABASE_URL";   /* e.g.  https://abcdwxyz.supabase.co            */
  window.SUPABASE_KEY = "YOUR_SUPABASE_KEY";   /* Publishable key (sb_publishable_...) or anon key */
</script>
<style>
/* ============================================================
   PARAGON — COMIC BOOK HERO SYSTEM
   Halftone · ink outlines · primary colors · pulp poster type
   ============================================================ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --paper:#F2E5C8; --paper-2:#E7D4A8; --paper-edge:#D6BC84;
  --ink:#1A130A; --line:#0B0A08;
  --bubble:#FFFDF4; --panel:#FFFDF6; --panel-2:#FBF1D9;
  --red:#E12C26;   --red-2:#A81C18;   --red-hi:#F44A44;
  --blue:#284FAE;  --blue-2:#182F73;  --blue-hi:#3D6EE0;
  --yellow:#FFD11C;--yellow-2:#EFB200; --yellow-hi:#FFE05A;
  --green:#2D9E4D; --green-2:#1E6E36;
  --purple:#7A38B2;--purple-2:#561F84;
  --orange:#F0691C;--orange-2:#C44F0E;
  --accent:var(--red); --accent-2:var(--red-2); --accent-hi:var(--red-hi); --accent-on:#fff;
  --crimson:var(--red); --cobalt:var(--blue); --line-strong:var(--line);
  --halftone:rgba(11,10,8,.17);
  --shadow:6px 6px 0 var(--line); --shadow-sm:3px 3px 0 var(--line); --radius:9px;
  --font-pow:"Bangers", Impact, system-ui, sans-serif;
  --font-impact:"Anton", "Arial Narrow", system-ui, sans-serif;
  --font-body:"Nunito", system-ui, -apple-system, sans-serif;
  --ease:cubic-bezier(.2,.85,.25,1); --ease-back:cubic-bezier(.34,1.56,.64,1);
  --maxw:580px;
  --muted:rgba(26,19,10,.56); --ink-2:rgba(26,19,10,.82);
  --font-display:var(--font-impact); --accent-ink:var(--accent-on); --emerald:var(--green);
}
[data-accent="crimson"]{--accent:var(--red);--accent-2:var(--red-2);--accent-hi:var(--red-hi);--accent-on:#fff}
[data-accent="cobalt"] {--accent:var(--blue);--accent-2:var(--blue-2);--accent-hi:var(--blue-hi);--accent-on:#fff}
[data-accent="gold"]   {--accent:var(--yellow);--accent-2:var(--yellow-2);--accent-hi:var(--yellow-hi);--accent-on:#1A130A}
[data-accent="emerald"]{--accent:var(--green);--accent-2:var(--green-2);--accent-hi:#3fbf68;--accent-on:#fff}
[data-accent="violet"] {--accent:var(--purple);--accent-2:var(--purple-2);--accent-hi:#9a54d0;--accent-on:#fff}
[data-accent="amber"]  {--accent:var(--orange);--accent-2:var(--orange-2);--accent-hi:#ff8a3d;--accent-on:#fff}
[data-theme="paper"],[data-theme="light"]{--paper:#F2E5C8;--paper-2:#E7D4A8;--paper-edge:#D6BC84;--ink:#1A130A;--line:#0B0A08;--bubble:#FFFDF4;--panel:#FFFDF6;--panel-2:#FBF1D9;--halftone:rgba(11,10,8,.17)}
[data-theme="midnight"],[data-theme="dark"]{--paper:#121A33;--paper-2:#1B2547;--paper-edge:#0B1024;--ink:#F6ECCF;--line:#06070E;--bubble:#1E2A54;--panel:#1A2348;--panel-2:#222C5A;--halftone:rgba(255,255,255,.10);--muted:rgba(246,236,207,.58);--ink-2:rgba(246,236,207,.85)}

html,body{height:100%}
body{font-family:var(--font-body);font-weight:700;color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased;overflow-x:hidden;position:relative}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(var(--halftone) 21%, transparent 22%);background-size:7px 7px;opacity:.55}
body::after{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(120% 90% at 50% 30%, transparent 55%, rgba(0,0,0,.16) 100%)}
button{font-family:inherit;color:inherit}
input,textarea,select{font-family:var(--font-body);font-weight:700}
::selection{background:var(--yellow);color:#1A130A}
svg{display:block}

#app{position:relative;z-index:1;min-height:100vh}
.shell{display:flex;align-items:stretch;min-height:100vh}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.view-wrap{flex:1;overflow-y:auto;padding-bottom:100px}
.container{max-width:var(--maxw);margin:0 auto;padding:14px 14px 0}

.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:10px;padding:9px 13px;background:var(--paper);border-bottom:3px solid var(--line)}
.topbar .spacer{flex:1}
.brand{display:flex;align-items:center;gap:9px;min-width:0}
.brand .mark{width:36px;height:36px;flex:none}
.brand .title b{display:block;font-family:var(--font-pow);font-size:1.4rem;letter-spacing:.04em;line-height:.9;color:var(--accent);-webkit-text-stroke:1.6px var(--line);paint-order:stroke fill}
.brand .title span{display:block;font-family:var(--font-impact);font-size:.56rem;letter-spacing:.24em;text-transform:uppercase;opacity:.7;margin-top:1px}
.streak-chip{display:flex;align-items:center;gap:5px;font-family:var(--font-impact);font-size:.9rem;background:var(--yellow);color:#1A130A;border:2.5px solid var(--line);border-radius:999px;padding:5px 11px;box-shadow:var(--shadow-sm);cursor:pointer;transition:transform .06s}
.streak-chip:active{transform:translate(2px,2px);box-shadow:none}
.streak-chip.cold{background:var(--panel-2);color:var(--ink);opacity:.65}
.streak-chip .flame{font-size:1rem}

.rail{display:none}
@media(min-width:900px){
  .rail{display:flex;flex-direction:column;align-items:center;gap:9px;width:104px;padding:16px 9px;background:var(--paper);border-right:3px solid var(--line);position:sticky;top:0;height:100vh}
  .rail-mark{width:48px;height:48px;margin-bottom:6px}
  .rail button{width:82px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;background:var(--bubble);border:2.5px solid var(--line);border-radius:9px;padding:9px 4px;font-family:var(--font-impact);font-size:.6rem;text-transform:uppercase;letter-spacing:.04em;box-shadow:var(--shadow-sm);transition:transform .06s}
  .rail button svg{width:22px;height:22px}
  .rail button.active{background:var(--accent);color:var(--accent-on);transform:rotate(-1.5deg)}
  .rail .rail-sp{flex:1}
  .tabbar{display:none}
}
.tabbar{position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;justify-content:space-around;gap:2px;padding:6px 6px calc(6px + env(safe-area-inset-bottom));background:var(--paper);border-top:3px solid var(--line)}
.tabbar button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:transparent;border:none;cursor:pointer;padding:3px 1px;font-family:var(--font-impact);font-size:.56rem;text-transform:uppercase;letter-spacing:.04em;color:var(--ink);opacity:.6}
.tabbar button .dot{display:none}
.tb-ic{width:42px;height:31px;display:grid;place-items:center;border:2.5px solid transparent;border-radius:8px;transition:.12s}
.tb-ic svg{width:22px;height:22px}
.tabbar button.active{opacity:1;color:var(--accent)}
.tabbar button.active .tb-ic{background:var(--accent);color:var(--accent-on);border-color:var(--line);box-shadow:var(--shadow-sm)}

#loader{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:var(--paper);transition:opacity .5s var(--ease)}
#loader::before{content:"";position:absolute;inset:0;background-image:radial-gradient(var(--halftone) 21%,transparent 22%);background-size:8px 8px;opacity:.5}
#loader.hide{opacity:0;pointer-events:none}
#loader>*{position:relative}
#loader .l-crest{width:104px;height:104px;animation:pop .6s var(--ease-back)}
#loader .l-name{font-family:var(--font-pow);font-size:2.8rem;letter-spacing:.05em;color:var(--accent);-webkit-text-stroke:2.6px var(--line);paint-order:stroke fill;text-shadow:5px 5px 0 var(--line)}
#loader .l-tag{font-family:var(--font-impact);text-transform:uppercase;letter-spacing:.34em;font-size:.66rem;opacity:.75}
.hidden{display:none !important}

.reveal,.reveal-item-in{animation:slam .42s var(--ease-back) both}
@keyframes slam{0%{opacity:0;transform:translateY(-16px) scale(.95) rotate(-1.2deg)}60%{opacity:1;transform:translateY(2px) scale(1.012)}100%{opacity:1;transform:none}}
@keyframes pop{0%{opacity:0;transform:scale(.4) rotate(-6deg)}70%{opacity:1;transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.panel,.card{position:relative;background:var(--panel);border:3px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;padding:16px;margin-top:14px}
.halftone-ov{position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(var(--halftone) 22%, transparent 23%);background-size:6px 6px;opacity:.5}
.rays{position:absolute;inset:-40%;pointer-events:none;background:repeating-conic-gradient(from 0deg at 50% 50%, rgba(255,255,255,.18) 0deg 5deg, transparent 5deg 11deg);opacity:.45}
.burst{position:absolute;pointer-events:none}
.cap{display:inline-block;background:var(--yellow);color:#1A130A;border:2.5px solid var(--line);font-family:var(--font-impact);text-transform:uppercase;letter-spacing:.04em;font-size:.74rem;padding:3px 10px;box-shadow:var(--shadow-sm);transform:rotate(-1.6deg)}
.section-title{display:flex;align-items:center;gap:9px;margin:24px 3px 12px;font-family:var(--font-pow);font-weight:400;letter-spacing:.02em;font-size:1.5rem;color:var(--accent);-webkit-text-stroke:1.8px var(--line);paint-order:stroke fill;text-shadow:3px 3px 0 var(--line);transform:rotate(-1deg);text-transform:uppercase}
.section-title .tag{font-family:var(--font-impact);font-size:.7rem;color:#1A130A;background:var(--yellow);border:2px solid var(--line);border-radius:5px;padding:1px 7px;-webkit-text-stroke:0;text-shadow:none;transform:rotate(1deg);letter-spacing:.02em}
.eyebrow{font-family:var(--font-impact);text-transform:uppercase;letter-spacing:.16em;font-size:.72rem;opacity:.75}
.bubble{position:relative;background:var(--bubble);border:3px solid var(--line);border-radius:18px;padding:13px 16px;font-family:var(--font-pow);font-size:1.2rem;letter-spacing:.01em;line-height:1.04;color:var(--ink);box-shadow:var(--shadow-sm)}
.bubble.tail::after{content:"";position:absolute;left:32px;bottom:-16px;border:13px solid transparent;border-top-color:var(--line)}
.bubble.tail::before{content:"";position:absolute;left:35px;bottom:-9px;border:10px solid transparent;border-top-color:var(--bubble);z-index:1}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;font-family:var(--font-impact);text-transform:uppercase;letter-spacing:.04em;font-size:.95rem;background:var(--bubble);color:var(--ink);border:3px solid var(--line);border-radius:8px;padding:11px 16px;box-shadow:var(--shadow-sm);transition:transform .06s var(--ease),box-shadow .06s var(--ease)}
.btn:active{transform:translate(3px,3px);box-shadow:0 0 0 var(--line)}
.btn svg{width:18px;height:18px}
.btn.primary{background:var(--accent);color:var(--accent-on)}
.btn.danger{background:var(--red);color:#fff}
.btn.ghost{background:var(--panel-2)}
.btn.block{width:100%}
.btn.sm{padding:7px 11px;font-size:.78rem;border-width:2.5px;box-shadow:2px 2px 0 var(--line)}
.icon-btn{width:42px;height:42px;display:grid;place-items:center;cursor:pointer;background:var(--bubble);border:3px solid var(--line);border-radius:8px;color:var(--ink);box-shadow:var(--shadow-sm);transition:transform .06s}
.icon-btn:active{transform:translate(2px,2px);box-shadow:none}
.icon-btn svg{width:20px;height:20px;stroke-width:2.4}
.chip{font-family:var(--font-impact);text-transform:uppercase;font-size:.62rem;letter-spacing:.04em;display:inline-flex;align-items:center;gap:4px;background:var(--panel-2);color:var(--ink);border:2.5px solid var(--line);border-radius:6px;padding:3px 8px}
.chip svg{width:13px;height:13px;stroke-width:2.6}
.chip.up{background:var(--green);color:#fff}
.chip.accent{background:var(--accent);color:var(--accent-on)}

.hero{position:relative;color:#fff;background:var(--accent);border:3px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;padding:18px;margin-top:6px}
.hero .burst{inset:-30% -10% auto;top:-30%;height:160%;left:-10%;width:120%}
.hero-top{position:relative;display:flex;gap:14px;align-items:center}
.crest-wrap{width:86px;height:86px;flex:none;display:grid;place-items:center;background:rgba(255,255,255,.14);border:3px solid var(--line);border-radius:12px;box-shadow:var(--shadow-sm)}
.crest-svg{width:74px;height:74px}
.hero-id{min-width:0}
.hero-id .greet{font-family:var(--font-pow);font-size:1.05rem;line-height:1;letter-spacing:.01em;opacity:.96;text-shadow:1.5px 1.5px 0 rgba(0,0,0,.35)}
.hero-id .name{font-family:var(--font-pow);font-size:2.2rem;line-height:.92;letter-spacing:.02em;color:#fff;-webkit-text-stroke:2px var(--line);paint-order:stroke fill;margin-top:2px}
.rank-line{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}
.rank-badge{font-family:var(--font-impact);text-transform:uppercase;font-size:.68rem;letter-spacing:.04em;background:var(--yellow);color:#1A130A;border:2.5px solid var(--line);border-radius:6px;padding:3px 8px;display:inline-flex;align-items:center;gap:4px}
.rank-badge svg{width:13px;height:13px;stroke-width:2.6}
.lvl-pill{font-family:var(--font-impact);font-size:.68rem;background:rgba(0,0,0,.3);color:#fff;border:2.5px solid var(--line);border-radius:6px;padding:3px 8px}
.xp-bar{position:relative;margin-top:16px}
.xp-track{height:18px;background:rgba(0,0,0,.32);border:3px solid var(--line);border-radius:999px;overflow:hidden}
.xp-fill{height:100%;background:var(--yellow);background-image:radial-gradient(rgba(0,0,0,.2) 22%,transparent 23%);background-size:8px 8px;transition:width 1s var(--ease)}
.xp-meta{display:flex;justify-content:space-between;margin-top:6px;font-family:var(--font-impact);font-size:.64rem;text-transform:uppercase;letter-spacing:.04em}

.focus-card{position:relative;background:var(--panel);border:3px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;cursor:pointer;margin-top:16px}
.focus-card .fc-grad{position:absolute;inset:0 0 auto;height:128px;background:var(--accent)}
.focus-card .fc-burst{position:absolute;inset:0 0 auto;height:128px;background-image:radial-gradient(rgba(255,255,255,.18) 22%,transparent 23%);background-size:7px 7px}
.fc-in{position:relative;padding:14px 16px 16px}
.fc-eye{display:inline-flex;align-items:center;gap:6px;color:#fff;font-family:var(--font-impact);text-transform:uppercase;letter-spacing:.05em;font-size:.72rem;background:rgba(0,0,0,.28);border:2.5px solid var(--line);border-radius:6px;padding:3px 9px}
.fc-eye svg{width:14px;height:14px;stroke-width:2.6}
.fc-in h2{font-family:var(--font-pow);font-size:3.4rem;line-height:.86;color:#fff;margin:10px 0 2px;-webkit-text-stroke:2.5px var(--line);paint-order:stroke fill}
.fc-focus{font-family:var(--font-impact);text-transform:uppercase;letter-spacing:.02em;font-size:.92rem;color:#fff;text-shadow:1.5px 1.5px 0 rgba(0,0,0,.3);max-width:80%}
.fc-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:62px}
.fc-cta{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:14px;flex-wrap:wrap}
.fc-progress{font-family:var(--font-impact);text-transform:uppercase;font-size:.66rem;letter-spacing:.04em;opacity:.7}
.muscle-badge{font-family:var(--font-impact);text-transform:uppercase;font-size:.62rem;letter-spacing:.04em;border:2.5px solid var(--line);border-radius:5px;padding:2px 7px;color:#fff;background:var(--ink)}
.muscle-badge.upper{background:var(--red)}.muscle-badge.lower{background:var(--blue)}.muscle-badge.cardio{background:var(--green)}

.ring-wrap{position:relative;display:grid;place-items:center}
.ring-wrap svg{display:block}
.ring-center{position:absolute;inset:0;display:grid;place-items:center;text-align:center;line-height:1}
.ring-center .pct{font-family:var(--font-impact);font-size:1rem;color:var(--ink)}
.ring-center .pct small{font-size:.55em}
.ring-center .pl{font-family:var(--font-impact);text-transform:uppercase;font-size:.5rem;letter-spacing:.06em;opacity:.65}
.mission{display:flex;gap:16px;align-items:center}
.mission-body h4{font-family:var(--font-impact);text-transform:uppercase;font-size:1rem;letter-spacing:.02em}
.mission-body p{font-size:.84rem;font-weight:700;opacity:.8;margin-top:2px}
.week-dots{display:flex;gap:6px;margin-top:9px}
.wd{width:17px;height:17px;border:2.5px solid var(--line);border-radius:4px;background:var(--bubble)}
.wd.done{background:var(--accent)}
.wd.rest{opacity:.4;border-style:dashed}
.wd.today{box-shadow:0 0 0 2.5px var(--yellow)}

.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.stat{position:relative;background:var(--panel);border:3px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:13px;overflow:hidden}
.stat .ic{width:32px;height:32px;display:grid;place-items:center;background:var(--accent);color:var(--accent-on);border:2.5px solid var(--line);border-radius:8px;margin-bottom:8px}
.stat .ic svg{width:17px;height:17px;stroke-width:2.6}
.stat .v{font-family:var(--font-impact);font-size:1.85rem;line-height:1;color:var(--ink)}
.stat .v small{font-family:var(--font-impact);font-size:.62rem;opacity:.6;margin-left:3px}
.stat .k{font-family:var(--font-impact);text-transform:uppercase;font-size:.6rem;letter-spacing:.05em;opacity:.7;margin-top:4px}

.habit-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.habit{display:flex;gap:11px;align-items:center;background:var(--panel);border:3px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:11px}
.hb-body{flex:1;min-width:0}
.hv{font-family:var(--font-impact);font-size:1.05rem;color:var(--ink)}
.hv small{font-family:var(--font-impact);font-size:.62rem;opacity:.55}
.hk{font-family:var(--font-impact);text-transform:uppercase;font-size:.6rem;letter-spacing:.05em;opacity:.7;margin-top:1px}
.habit-actions{display:flex;gap:6px;margin-top:7px}
.mini-btn{width:30px;height:30px;display:grid;place-items:center;cursor:pointer;background:var(--accent);color:var(--accent-on);border:2.5px solid var(--line);border-radius:6px;box-shadow:var(--shadow-sm);transition:transform .06s}
.mini-btn:active{transform:translate(2px,2px);box-shadow:none}
.mini-btn svg{width:15px;height:15px;stroke-width:3}

.readiness{display:flex;gap:16px;align-items:center}
.readiness .big{font-family:var(--font-pow);font-size:3rem;line-height:.9;color:var(--accent);-webkit-text-stroke:1.6px var(--line);paint-order:stroke fill}
.readiness .lab{font-family:var(--font-impact);text-transform:uppercase;font-size:.58rem;letter-spacing:.05em;opacity:.7}
.r-sliders{flex:1;display:flex;flex-direction:column;gap:11px}
.r-slider{display:flex;align-items:center;gap:10px}
.r-slider .rl{font-family:var(--font-impact);text-transform:uppercase;font-size:.62rem;letter-spacing:.04em;width:64px;opacity:.8}
.r-slider .rv{font-family:var(--font-impact);font-size:.95rem;width:18px;text-align:center}
input[type=range]{-webkit-appearance:none;appearance:none;flex:1;height:11px;background:var(--paper-2);border:2.5px solid var(--line);border-radius:999px;outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;background:var(--accent);border:2.5px solid var(--line);border-radius:6px;cursor:pointer;box-shadow:var(--shadow-sm)}

.theme-toggle button{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;font-family:var(--font-impact);text-transform:uppercase;font-size:.82rem;letter-spacing:.03em;background:var(--bubble);color:var(--ink);border:2.5px solid var(--line);border-radius:8px;padding:10px;box-shadow:var(--shadow-sm)}
.theme-toggle button svg{width:16px;height:16px;stroke-width:2.4}
.theme-toggle button.active{background:var(--accent);color:var(--accent-on)}
.accent-swatches{display:flex;gap:11px;flex-wrap:wrap}
.swatch{position:relative;width:44px;height:44px;cursor:pointer;border:3px solid var(--line);border-radius:8px;box-shadow:var(--shadow-sm);transition:transform .06s}
.swatch:active{transform:translate(2px,2px);box-shadow:none}
.swatch.active::after{content:"\2605";position:absolute;inset:0;display:grid;place-items:center;color:#fff;font-size:1.2rem;text-shadow:0 0 3px rgba(0,0,0,.7),1px 1px 0 var(--line)}

.modal-scrim{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:18px;background:color-mix(in srgb,var(--paper) 70%, transparent)}
.modal-scrim.show{display:flex;animation:fadeIn .18s}
.modal{position:relative;width:100%;max-width:380px;background:var(--panel);border:4px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:20px;animation:pop .35s var(--ease-back)}
.modal h3{font-family:var(--font-pow);font-size:1.7rem;letter-spacing:.01em;color:var(--ink);line-height:1}
.modal .m-desc{font-size:.88rem;font-weight:700;opacity:.78;margin-top:8px;line-height:1.4}
.modal-actions{display:flex;gap:10px;margin-top:18px}
.modal-actions .btn{flex:1}

#toast-wrap{position:fixed;left:0;right:0;bottom:calc(86px + env(safe-area-inset-bottom));z-index:120;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;padding:0 16px}
@media(min-width:900px){#toast-wrap{bottom:24px}}
.toast{display:flex;align-items:center;gap:10px;background:var(--ink);color:var(--paper);border:3px solid var(--line);border-radius:10px;padding:11px 15px;box-shadow:var(--shadow-sm);font-family:var(--font-impact);text-transform:uppercase;font-size:.78rem;letter-spacing:.02em;max-width:420px;animation:slam .35s var(--ease-back) both}
.toast.success{background:var(--green);color:#fff}
.toast .t-ic{font-size:1.1rem}
.toast.out{animation:fadeIn .36s reverse both}

#confetti-canvas{position:fixed;inset:0;z-index:85;pointer-events:none}
#sfx-layer{position:fixed;inset:0;z-index:95;pointer-events:none;overflow:hidden}
.sfx{position:absolute;font-family:var(--font-pow);font-size:3.4rem;color:var(--yellow);-webkit-text-stroke:2.6px var(--line);paint-order:stroke fill;text-shadow:5px 5px 0 var(--line);transform:translate(-50%,-50%) rotate(var(--rot));animation:sfxPop .7s var(--ease-back) forwards;white-space:nowrap}
@keyframes sfxPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.3) rotate(var(--rot))}28%{opacity:1;transform:translate(-50%,-50%) scale(1.18) rotate(var(--rot))}66%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(var(--rot))}100%{opacity:0;transform:translate(-50%,-70%) scale(1) rotate(var(--rot))}}

::-webkit-scrollbar{width:12px;height:12px}
::-webkit-scrollbar-thumb{background:var(--paper-2);border:2.5px solid var(--line);border-radius:8px}
::-webkit-scrollbar-track{background:transparent}

@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms !important;animation-iteration-count:1 !important}.reveal,.reveal-item-in{opacity:1;animation:none}}
@media(min-width:560px){.stat-row{grid-template-columns:repeat(4,1fr)}.habit-grid{grid-template-columns:repeat(4,1fr)}}
</style>

<!-- LOADER -->
<div id="loader">
  <svg class="l-crest" viewBox="0 0 100 100" id="loaderCrest"></svg>
  <div class="l-name">PARAGON</div>
  <div class="l-tag">Issue&nbsp;#1 · Your Origin Story</div>
</div>

<div id="app" class="hidden">
  <div class="shell">
    <nav class="rail" id="rail"></nav>
    <div class="main">
      <header class="topbar">
        <div class="brand">
          <svg class="mark" viewBox="0 0 100 100" id="brandCrest"></svg>
          <div class="title"><b>PARAGON</b><span>Hero Training</span></div>
        </div>
        <div class="spacer"></div>
        <div class="streak-chip" id="streakChip" role="button" tabindex="0" title="Heroic streak">
          <span class="flame">🔥</span><span id="streakNum">0</span>
        </div>
        <button class="icon-btn" id="searchTopBtn" title="Search (press /)" aria-label="Search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        </button>
      </header>
      <main class="view-wrap" id="viewWrap">
        <div class="container" id="view"></div>
      </main>
    </div>
  </div>
  <nav class="tabbar" id="tabbar"></nav>
</div>

<!-- overlays -->
<canvas id="confetti-canvas"></canvas>
<div id="toast-wrap"></div>
<div class="rest-overlay" id="restOverlay"></div>
<div class="splash" id="splash"></div>
<div class="modal-scrim" id="modalScrim"><div class="modal" id="modal"></div></div>

<script>
"use strict";
/* =========================================================================
   PARAGON — application logic
   ========================================================================= */

/* ----------------------------- PROGRAM DATA ----------------------------- */
// rest values are in seconds. unit 'reps' or 'sec'.
const PROGRAM = {
  meta:{
    title:"Training Program — Shalom",
    subtitle:"Fat loss + muscle gain · Upper/Lower split · 4 days (+ optional 5th)",
    order:["upperA","lowerA","upperB","lowerB"],
  },
  workouts:{
    upperA:{
      key:"upperA", name:"Upper A", letter:"Upper A", focus:"Chest & shoulder emphasis",
      group:"Upper", est:52,
      exercises:[
        {id:"ua1", name:"Incline Dumbbell Press 30°", detail:"Bench notch 2", sets:3, repMin:8, repMax:12, rest:150, unit:"reps", compound:true, warmup:true},
        {id:"ua2", name:"Diverging Lat Pulldown", detail:"Notch 2", sets:3, repMin:10, repMax:12, rest:150, unit:"reps", compound:true},
        {id:"ua3", name:"Dumbbell Shoulder Press 60°", detail:"Bench notch 4", sets:2, repMin:10, repMax:12, rest:120, unit:"reps", compound:true},
        {id:"ua4", name:"Seated Cable Row", detail:"", sets:2, repMin:10, repMax:12, rest:120, unit:"reps", compound:true},
        {id:"ua5", name:"Incline Lateral Raises 30°", detail:"Bench notch 2", sets:2, repMin:15, repMax:20, rest:75, unit:"reps"},
        {id:"ua6", name:"Overhead Triceps Extension", detail:"Rope, low pulley · notch 11", sets:2, repMin:12, repMax:15, rest:90, unit:"reps"},
        {id:"ua7", name:"Arm Curl Machine", detail:"Notch 7", sets:2, repMin:12, repMax:15, rest:90, unit:"reps"},
      ],
    },
    lowerA:{
      key:"lowerA", name:"Lower A", letter:"Lower A", focus:"Quad emphasis",
      group:"Lower", est:48,
      exercises:[
        {id:"la1", name:"Hack Squat", detail:"", sets:3, repMin:8, repMax:12, rest:180, unit:"reps", compound:true, warmup:true},
        {id:"la2", name:"Leg Curl Prone", detail:"Notch 4–5", sets:3, repMin:12, repMax:15, rest:120, unit:"reps"},
        {id:"la3", name:"Leg Press", detail:"Notch 6", sets:2, repMin:10, repMax:15, rest:150, unit:"reps", compound:true},
        {id:"la4", name:"Standing Calf Raise", detail:"Perfect Squat · base 30.4 kg", sets:3, repMin:10, repMax:15, rest:90, unit:"reps"},
        {id:"la5", name:"Crunch Machine", detail:"Notch 5", sets:3, repMin:15, repMax:20, rest:75, unit:"reps"},
      ],
    },
    upperB:{
      key:"upperB", name:"Upper B", letter:"Upper B", focus:"Back emphasis",
      group:"Upper", est:54,
      exercises:[
        {id:"ub1", name:"Converging Chest Press", detail:"Notch 4", sets:3, repMin:8, repMax:12, rest:150, unit:"reps", compound:true, warmup:true},
        {id:"ub2", name:"Lat Pulldown", detail:"Close / neutral grip", sets:3, repMin:10, repMax:12, rest:150, unit:"reps", compound:true},
        {id:"ub3", name:"Pec Fly", detail:"Notch 4", sets:2, repMin:12, repMax:15, rest:90, unit:"reps"},
        {id:"ub4", name:"Seated Cable Row", detail:"", sets:2, repMin:10, repMax:12, rest:120, unit:"reps", compound:true},
        {id:"ub5", name:"Rear Delt Fly", detail:"Horizontal grip · notch 3", sets:2, repMin:15, repMax:20, rest:75, unit:"reps"},
        {id:"ub6", name:"Triceps Pushdown", detail:"Rope, pronated grip · notch 18", sets:2, repMin:10, repMax:12, rest:90, unit:"reps"},
        {id:"ub7", name:"Arm Curl Machine", detail:"Notch 7", sets:2, repMin:12, repMax:15, rest:90, unit:"reps"},
      ],
    },
    lowerB:{
      key:"lowerB", name:"Lower B", letter:"Lower B", focus:"Glute & hamstring emphasis",
      group:"Lower", est:50,
      exercises:[
        {id:"lb1", name:"Glute Trainer Machine", detail:"", sets:3, repMin:10, repMax:15, rest:150, unit:"reps", compound:true, warmup:true},
        {id:"lb2", name:"Dumbbell Romanian Deadlift", detail:"Hinge at hips, flat back", sets:3, repMin:10, repMax:12, rest:150, unit:"reps", compound:true},
        {id:"lb3", name:"Back Extension", detail:"Hip hinge · notch 2", sets:2, repMin:12, repMax:15, rest:90, unit:"reps"},
        {id:"lb4", name:"Abduction Machine", detail:"Torso leaning forward 25°", sets:2, repMin:15, repMax:25, rest:75, unit:"reps"},
        {id:"lb5", name:"Seated Calf Raise", detail:"Base 11.3 kg · notch 4", sets:3, repMin:15, repMax:20, rest:90, unit:"reps"},
        {id:"lb6", name:"Plank", detail:"On forearms; add seconds to progress", sets:2, repMin:30, repMax:45, rest:60, unit:"sec", bodyweight:true},
      ],
    },
    cardio:{
      key:"cardio", name:"Day 5 · Cardio + Core", letter:"Cardio", focus:"Steady zone-2 cardio + optional core",
      group:"Cardio", est:40, isCardio:true, exercises:[],
    },
  },
  schedule:[
    {day:"Mon", key:"upperA"},
    {day:"Tue", key:"lowerA"},
    {day:"Wed", key:"rest"},
    {day:"Thu", key:"upperB"},
    {day:"Fri", key:"lowerB"},
    {day:"Sat", key:"cardio"},
    {day:"Sun", key:"rest"},
  ],
};

// flat exercise lookup
const EX_BY_ID = {};
Object.values(PROGRAM.workouts).forEach(w=>w.exercises.forEach(e=>{EX_BY_ID[e.id]={...e, workoutKey:w.key, workoutName:w.name};}));

/* ----------------------------- RANKS ----------------------------- */
const RANKS = [
  {name:"Rookie",     xp:0},
  {name:"Initiate",   xp:400},
  {name:"Challenger", xp:1000},
  {name:"Contender",  xp:2000},
  {name:"Vanguard",   xp:3500},
  {name:"Sentinel",   xp:5500},
  {name:"Warden",     xp:8200},
  {name:"Champion",   xp:11800},
  {name:"Paragon",    xp:16500},
  {name:"Legend",     xp:22500},
  {name:"Mythic",     xp:30000},
  {name:"Eternal",    xp:40000},
];

/* ----------------------------- ACHIEVEMENTS ----------------------------- */
// check(d) → returns {done:bool, progress?:0..1, label?:string}
const ACHIEVEMENTS = [
  {id:"first_blood", icon:"⚡", name:"Origin Story", desc:"Complete your first workout.",
    check:d=>({done:d.sessions.length>=1})},
  {id:"week_full", icon:"🛡️", name:"Full Mission", desc:"Finish all 4 lifting sessions in one week.",
    check:d=>{const m=Math.max(0,...weeklyLiftCounts(d)); return {done:m>=4, progress:Math.min(1,m/4), label:m+"/4 in best week"};}},
  {id:"streak3", icon:"🔥", name:"Ignition", desc:"Reach a 3-day training streak.",
    check:d=>({done:(d.streak.longest||0)>=3, progress:Math.min(1,(d.streak.longest||0)/3), label:(d.streak.longest||0)+"/3 best"})},
  {id:"streak7", icon:"☄️", name:"Unstoppable", desc:"Reach a 7-day training streak.",
    check:d=>({done:(d.streak.longest||0)>=7, progress:Math.min(1,(d.streak.longest||0)/7), label:(d.streak.longest||0)+"/7 best"})},
  {id:"sessions10", icon:"💪", name:"Forged", desc:"Log 10 total workouts.",
    check:d=>({done:d.sessions.length>=10, progress:Math.min(1,d.sessions.length/10), label:d.sessions.length+"/10"})},
  {id:"sessions30", icon:"🏛️", name:"Disciplined", desc:"Log 30 total workouts.",
    check:d=>({done:d.sessions.length>=30, progress:Math.min(1,d.sessions.length/30), label:d.sessions.length+"/30"})},
  {id:"sets100", icon:"🎯", name:"Centurion", desc:"Complete 100 working sets.",
    check:d=>({done:d.totals.sets>=100, progress:Math.min(1,d.totals.sets/100), label:d.totals.sets+"/100"})},
  {id:"vol10k", icon:"🪨", name:"Heavy Lifter", desc:"Move 10,000 kg of total volume.",
    check:d=>({done:d.totals.volume>=10000, progress:Math.min(1,d.totals.volume/10000), label:fmtVol(d.totals.volume)+" / 10k"})},
  {id:"vol50k", icon:"⛰️", name:"Mountain Mover", desc:"Move 50,000 kg of total volume.",
    check:d=>({done:d.totals.volume>=50000, progress:Math.min(1,d.totals.volume/50000), label:fmtVol(d.totals.volume)+" / 50k"})},
  {id:"first_pr", icon:"🏆", name:"Record Breaker", desc:"Set your first personal record.",
    check:d=>({done:Object.keys(d.prs||{}).length>=1})},
  {id:"first_progress", icon:"📈", name:"Level Up", desc:"Earn your first weight increase via double progression.",
    check:d=>({done:(d.progressionEvents||0)>=1})},
  {id:"hydrated5", icon:"💧", name:"Well-Watered", desc:"Hit your water goal on 5 days.",
    check:d=>{const n=habitGoalDays(d,"water"); return {done:n>=5, progress:Math.min(1,n/5), label:n+"/5 days"};}},
  {id:"steps5", icon:"👟", name:"Pavement Pounder", desc:"Hit your step goal on 5 days.",
    check:d=>{const n=habitGoalDays(d,"steps"); return {done:n>=5, progress:Math.min(1,n/5), label:n+"/5 days"};}},
  {id:"protein5", icon:"🍗", name:"Protein Pact", desc:"Hit your protein goal on 5 days.",
    check:d=>{const n=habitGoalDays(d,"protein"); return {done:n>=5, progress:Math.min(1,n/5), label:n+"/5 days"};}},
  {id:"bodylog", icon:"⚖️", name:"Know Thyself", desc:"Log your bodyweight for the first time.",
    check:d=>({done:(d.bodyweight||[]).length>=1})},
  {id:"comeback", icon:"🌅", name:"The Return", desc:"Train again after 7+ days away.",
    check:d=>({done:!!d.flags.comeback})},
  {id:"rank5", icon:"🌟", name:"Vanguard", desc:"Reach the rank of Vanguard.",
    check:d=>({done:levelInfo(d.xp).index>=4})},
  {id:"photo", icon:"📸", name:"Visible Progress", desc:"Save your first progress photo.",
    check:d=>({done:(d.photos||[]).length>=1})},
];

/* ----------------------------- MOTIVATION ----------------------------- */
const MESSAGES = {
  morning:["The hero gets up before the excuse does.","First rep of the day decides the rest.","Discipline now, freedom later."],
  trainToday:["Today's session is yours to claim.","Show up. The rest follows.","One honest workout > one perfect plan."],
  rest:["Recovery is where strength is built.","Rest is part of the program, not a break from it.","Walk, eat, sleep — grow."],
  onStreak:["The streak is the superpower.","Momentum is on your side. Keep it.","Consistency is quietly making you dangerous."],
  comeback:["Welcome back. The mission resumes now.","Missing a day isn't failing. Quitting is.","One session erases a week of doubt."],
  postWorkout:["That's how heroes are forged.","Logged. Banked. Stronger.","You just out-worked yesterday."],
  pr:["New record. New ceiling.","You just rewrote your limits.","Stronger than you've ever been."],
};

/* ----------------------------- UTILITIES ----------------------------- */
const $ = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>[...r.querySelectorAll(s)];
const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
const pad2=n=>String(n).padStart(2,"0");

function dkey(d=new Date()){ return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate()); }
function parseDk(s){ const [y,m,dd]=s.split("-").map(Number); return new Date(y,m-1,dd); }
function daysBetween(a,b){ return Math.round((parseDk(b)-parseDk(a))/86400000); }
function startOfWeek(d=new Date()){ const x=new Date(d); const day=(x.getDay()+6)%7; x.setDate(x.getDate()-day); x.setHours(0,0,0,0); return x; } // Monday
function fmtDate(s,opts={month:"short",day:"numeric"}){ try{return parseDk(s).toLocaleDateString(undefined,opts);}catch(e){return s;} }
function fmtClock(sec){ sec=Math.max(0,Math.round(sec)); const m=Math.floor(sec/60),s=sec%60; return m+":"+pad2(s); }
function fmtRest(sec){ const m=Math.floor(sec/60),s=sec%60; return m+(s?(":"+pad2(s)):":00"); }
function fmtNum(n){ n=Math.round(n); return n.toLocaleString("en-US"); }
function fmtVol(n){ if(n>=1000) return (n/1000).toFixed(n>=10000?0:1).replace(/\.0$/,"")+"k"; return Math.round(n)+""; }
function epley(w,r){ return (w>0&&r>0)? w*(1+r/30) : 0; }
function greeting(){ const h=new Date().getHours(); return h<5?"Late night":h<12?"Good morning":h<18?"Good afternoon":"Good evening"; }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function debounce(fn,ms){ let t; return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);}; }
function haptic(ms=12){ if(navigator.vibrate) try{navigator.vibrate(ms);}catch(e){} }

/* ----------------------------- STORE ----------------------------- */
const LS_KEY="paragon_v1";
function defaultState(){
  return {
    version:1,
    profile:{ name:"Shalom", created:new Date().toISOString() },
    settings:{ theme:"dark", accent:"gold", unit:"kg" },
    goals:{ steps:8000, protein:4, sleep:8, water:8 },
    sessions:[], logs:{}, prs:{},
    totals:{ workouts:0, sets:0, reps:0, volume:0 },
    streak:{ current:0, longest:0, last:null },
    xp:0, achievements:{}, bodyweight:[], measurements:[], habits:{}, photos:[], notes:[],
    readiness:{}, progressionEvents:0, flags:{comeback:false}, active:null,
  };
}
let S = loadState();
function loadState(){
  try{
    const raw=localStorage.getItem(LS_KEY);
    if(!raw) return defaultState();
    const data=JSON.parse(raw);
    return Object.assign(defaultState(), data, {
      profile:Object.assign(defaultState().profile, data.profile||{}),
      settings:Object.assign(defaultState().settings, data.settings||{}),
      goals:Object.assign(defaultState().goals, data.goals||{}),
      totals:Object.assign(defaultState().totals, data.totals||{}),
      streak:Object.assign(defaultState().streak, data.streak||{}),
      flags:Object.assign(defaultState().flags, data.flags||{}),
    });
  }catch(e){ console.warn("load failed",e); return defaultState(); }
}
const save = debounce(()=>{ try{ localStorage.setItem(LS_KEY, JSON.stringify(S)); }catch(e){ toast("Storage full — export a backup","⚠️"); } if(window.__cloudPush)window.__cloudPush(); }, 250);
function saveNow(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(S)); }catch(e){} if(window.__cloudPush)window.__cloudPush(); }

/* ----------------------------- DERIVED STATS ----------------------------- */
function liftSessions(d=S){ return d.sessions.filter(s=>s.group!=="Cardio"); }
function sessionsInRange(d,fromDk,toDk){ return d.sessions.filter(s=>s.date>=fromDk && s.date<=toDk); }
function thisWeekSessions(d=S){ const ws=dkey(startOfWeek()); return liftSessions(d).filter(s=>s.date>=ws); }
function thisMonthSessions(d=S){ const now=new Date(); const m=now.getFullYear()+"-"+pad2(now.getMonth()+1); return liftSessions(d).filter(s=>s.date.startsWith(m)); }
function weeklyLiftCounts(d=S){ // counts per ISO week (last 12 weeks), returns array
  const map={};
  liftSessions(d).forEach(s=>{ const wk=dkey(startOfWeek(parseDk(s.date))); map[wk]=(map[wk]||0)+1; });
  return Object.values(map);
}
function uniqueTrainingDays(d=S){ return [...new Set(d.sessions.map(s=>s.date))].sort(); }
function adherencePct(d=S, weeks=4){
  const today=new Date(); const from=new Date(today); from.setDate(from.getDate()-weeks*7);
  const n=sessionsInRange(d,dkey(from),dkey(today)).filter(s=>s.group!=="Cardio").length;
  return clamp(Math.round(n/(weeks*4)*100),0,100);
}
function trainingFrequency(d=S, weeks=4){
  const today=new Date(); const from=new Date(today); from.setDate(from.getDate()-weeks*7);
  const n=sessionsInRange(d,dkey(from),dkey(today)).filter(s=>s.group!=="Cardio").length;
  return (n/weeks);
}
function habitGoalDays(d=S, key){
  let n=0; const g=d.goals[key]||0;
  Object.values(d.habits||{}).forEach(h=>{ if((h[key]||0)>=g && g>0) n++; });
  return n;
}
function levelInfo(xp){
  let i=0;
  for(let k=0;k<RANKS.length;k++){ if(xp>=RANKS[k].xp) i=k; }
  const cur=RANKS[i], next=RANKS[i+1];
  const into=xp-cur.xp;
  const span=next?(next.xp-cur.xp):1;
  const pct=next?clamp(into/span,0,1):1;
  return { index:i, level:i+1, name:cur.name, cur, next, into, span, pct, toNext: next?(next.xp-xp):0 };
}
function nextScheduledKey(d=S){
  // primary: rotation after last lift; fallback to weekday schedule
  const lifts=liftSessions(d);
  if(lifts.length){
    const last=lifts[lifts.length-1].key;
    const order=PROGRAM.meta.order;
    const idx=order.indexOf(last);
    if(idx>=0) return order[(idx+1)%order.length];
  }
  const today=PROGRAM.schedule[(new Date().getDay()+6)%7].key;
  if(today!=="rest"&&today!=="cardio") return today;
  return PROGRAM.meta.order[0];
}
function lastLogFor(exId,d=S){ const l=d.logs[exId]; return l&&l.length?l[l.length-1]:null; }
function prFor(exId,d=S){ return d.prs[exId]||null; }
function readyToLevel(exId,d=S){ const l=lastLogFor(exId,d); return !!(l&&l.allTop&&l.topWeight>0); }
function suggestIncrement(ex){ const isoDb = !ex.compound && /dumbbell/i.test(ex.name); return isoDb?2:2.5; }

/* ----------------------------- TOAST ----------------------------- */
function toast(msg, icon="✦", kind=""){
  const w=$("#toast-wrap");
  const t=document.createElement("div");
  t.className="toast "+kind;
  t.innerHTML=`<div class="t-ic">${icon}</div><div>${esc(msg)}</div>`;
  w.appendChild(t);

/* ----------------------------- CONFETTI ----------------------------- */
const Confetti=(()=>{
  const cv=$("#confetti-canvas"); const ctx=cv.getContext("2d");
  let parts=[], raf=null, W=0,H=0;
  function resize(){ W=cv.width=innerWidth*devicePixelRatio; H=cv.height=innerHeight*devicePixelRatio; cv.style.width=innerWidth+"px"; cv.style.height=innerHeight+"px"; }
  addEventListener("resize",resize); resize();
  function colors(){ const cs=getComputedStyle(document.documentElement);
    return [cs.getPropertyValue("--accent"),cs.getPropertyValue("--accent-hi"),cs.getPropertyValue("--cobalt"),cs.getPropertyValue("--crimson"),"#ffffff"].map(c=>c.trim()); }
  function burst(x=0.5,y=0.4,amount=120){
    if(matchMedia("(prefers-reduced-motion:reduce)").matches) amount=Math.min(amount,30);
    const cols=colors();
    for(let i=0;i<amount;i++){
      const a=Math.random()*Math.PI*2, sp=(Math.random()*9+4)*devicePixelRatio;
      parts.push({x:x*W,y:y*H,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-6*devicePixelRatio,
        g:0.28*devicePixelRatio,life:1,decay:0.008+Math.random()*0.01,
        size:(Math.random()*7+4)*devicePixelRatio,rot:Math.random()*6.28,vr:(Math.random()-0.5)*0.3,
        color:cols[Math.floor(Math.random()*cols.length)],shape:Math.random()>0.5?"r":"c"});
    }
    if(!raf) loop();
  }
  function loop(){
    ctx.clearRect(0,0,W,H);
    parts=parts.filter(p=>p.life>0);
    parts.forEach(p=>{
      p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.vx*=0.99; p.rot+=p.vr; p.life-=p.decay;
      ctx.save(); ctx.globalAlpha=Math.max(0,p.life); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle=p.color;
      if(p.shape==="r") ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.6);
      else{ ctx.beginPath(); ctx.arc(0,0,p.size/2,0,6.28); ctx.fill(); }
      ctx.restore();
    });
    if(parts.length) raf=requestAnimationFrame(loop); else { raf=null; ctx.clearRect(0,0,W,H); }
  }
  return { burst };
})();

// charge 0..1 fills the ring. Returns inner markup for a 0..100 viewBox svg.
function crestMarkup(charge=0, idp="c"){
  const c=clamp(charge,0,1);
  const R=46, circ=2*Math.PI*R;
  return `
  <defs>
    <linearGradient id="${idp}g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="var(--accent-hi)"/><stop offset="1" stop-color="var(--accent-2)"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="${R}" fill="none" stroke="var(--line-strong)" stroke-width="5"/>
  <circle cx="50" cy="50" r="${R}" fill="none" stroke="url(#${idp}g)" stroke-width="5" stroke-linecap="round"
    stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-c)}" transform="rotate(-90 50 50)" style="transition:stroke-dashoffset 1s var(--ease)"/>
  <!-- original heroic emblem: faceted chevron-star inside shield -->
  <path d="M50 18 L74 30 V52 C74 67 63 78 50 84 C37 78 26 67 26 52 V30 Z"
    fill="color-mix(in srgb, var(--accent) 16%, transparent)" stroke="url(#${idp}g)" stroke-width="2.4" stroke-linejoin="round"/>
  <path d="M50 30 L57 47 L50 42 L43 47 Z" fill="url(#${idp}g)"/>
  <path d="M50 44 L62 70 L50 62 L38 70 Z" fill="var(--accent)" opacity="0.92"/>
  `;
}

/* ----------------------------- SVG RING (progress) ----------------------------- */
function ringSvg(pct, size=72, stroke=8, label=""){
  const r=(size-stroke)/2, c=2*Math.PI*r, off=c*(1-clamp(pct,0,1));
  return `<div class="ring-wrap" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--line-strong)" stroke-width="${stroke}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="url(#ringG)" stroke-width="${stroke}" stroke-linecap="round"
        stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dashoffset .9s var(--ease)"/>
      <defs><linearGradient id="ringG" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="var(--accent-hi)"/><stop offset="1" stop-color="var(--accent-2)"/></linearGradient></defs>
    </svg>
    <div class="ring-center"><div class="pct">${Math.round(pct*100)}<span style="font-size:.6em">%</span></div>${label?`<div class="pl">${label}</div>`:""}</div>
  </div>`;
}

/* =========================================================================
   SESSION ENGINE
   ========================================================================= */
function startSession(key){
  const w=PROGRAM.workouts[key]; if(!w) return;
  if(S.active && S.active.key!==key){
    confirmModal({title:"Start a new session?",
      desc:`You have an unfinished ${PROGRAM.workouts[S.active.key].letter} session. Starting ${w.letter} will discard the draft.`,
      confirm:"Start new", danger:true, onConfirm:()=>{ S.active=null; startSession(key); }});
    return;
  }
  if(w.isCardio){ startCardio(); return; }
  if(!S.active || S.active.key!==key){
    S.active={
      key, group:w.group, name:w.name, letter:w.letter, isCardio:false,
      date:dkey(), startedAt:Date.now(),
      exercises: w.exercises.map(ex=>{
        const prev=lastLogFor(ex.id); const pw=prev&&prev.topWeight?String(prev.topWeight):"";
        const sets=[];
        const warm=ex.warmup?2:0;
        for(let i=0;i<warm;i++) sets.push({kind:"warm",weight:"",reps:"",done:false});
        for(let i=0;i<ex.sets;i++) sets.push({kind:"work",weight:pw,reps:"",done:false});
        return {id:ex.id, sets, collapsed:false};
      }),
    };
    saveNow();
  }
  go("session");
}

/* ---- live calculation helpers ---- */
function workingIndex(exId, si){ const exA=S.active.exercises.find(x=>x.id===exId); let n=0; for(let i=0;i<=si;i++){ if(exA.sets[i].kind==="work") n++; } return n; }
function exVolume(exA){ const ex=EX_BY_ID[exA.id]; let vol=0; exA.sets.forEach(s=>{ if(s.kind!=="work"||!s.done) return; const wt=ex.bodyweight?0:(+s.weight||0); const rp=+s.reps||0; if(ex.unit!=="sec") vol+=wt*rp; }); return vol; }
function sessionTotals(){ let done=0,total=0,vol=0; S.active.exercises.forEach(exA=>{ const ex=EX_BY_ID[exA.id]; exA.sets.forEach(s=>{ if(s.kind!=="work") return; total++; if(s.done){ done++; const wt=ex.bodyweight?0:(+s.weight||0); const rp=+s.reps||0; if(ex.unit!=="sec") vol+=wt*rp; } }); }); return {doneSets:done,totalSets:total,vol}; }

/* ---- render ---- */
function viewSession(){

function exerciseCard(exA, ei){

      </div>

      ${exA.sets.map((s,si)=>setRow(exA.id,s,si,ex)).join("")}

function setRow(exId, s, si, ex){
  const warm = s.kind==="warm";
  const wLabel = ex.bodyweight ? "BODY" : "KG";
  const rLabel = ex.unit==="sec" ? "SEC" : "REPS";

  const wInput = ex.bodyweight
    ? `<input class="set-input" value="—" disabled style="opacity:.45">`
    : `<input class="set-input ${s.weight!==""?"filled":""}" type="number" inputmode="decimal" step="0.5" data-field="weight" value="${s.weight}" placeholder="0">`;
  return `<div class="set-row ${warm?"warm":""}" data-ex="${exId}" data-si="${si}">
    <div class="set-no">${setNo}</div>
    <div class="set-mini"><label>${wLabel}</label>${wInput}</div>
    <div class="set-mini"><label>${rLabel}</label><input class="set-input ${s.reps!==""?"filled":""}" type="number" inputmode="numeric" data-field="reps" value="${s.reps}" placeholder="${warm?"":ex.repMin}"></div>
    <button class="set-check ${s.done?"checked":""}" data-check aria-label="Complete set">${icon("check")}</button>
  </div>`;
}

/* ---- live updates ---- */
let sessTimerInt=null;
function startSessionTimer(){ stopSessionTimer(); sessTimerInt=setInterval(()=>{ const el=$("#shTimer"); if(!el||!S.active){stopSessionTimer();return;} el.textContent=fmtClock((Date.now()-S.active.startedAt)/1000); },1000); const el0=$("#shTimer"); if(el0&&S.active) el0.textContent=fmtClock((Date.now()-S.active.startedAt)/1000); }
function stopSessionTimer(){ if(sessTimerInt) clearInterval(sessTimerInt); sessTimerInt=null; }
function refreshSessionStats(){ const {doneSets,totalSets,vol}=sessionTotals();
  const f=$("#shFill"); if(f) f.style.width=(totalSets?doneSets/totalSets*100:0)+"%";

}
function updateExVol(id){ const exA=S.active.exercises.find(x=>x.id===id); const el=$("#exvol-"+id); if(el) el.textContent=fmtVol(exVolume(exA)); }

/* ---- rest timer overlay ---- */
let restTimer=null, restRemain=0, restTotal=0;
function restRingSvg(){ const size=240,stroke=12,r=(size-stroke)/2,c=2*Math.PI*r;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="transform:rotate(-90deg)">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--line-strong)" stroke-width="${stroke}"/>
    <circle id="rtArc" cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="url(#rtGrad)" stroke-width="${stroke}" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="0" style="transition:stroke-dashoffset 1s linear"/>
    <defs><linearGradient id="rtGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="var(--accent-hi)"/><stop offset="1" stop-color="var(--accent-2)"/></linearGradient></defs>
  </svg>`;
}
function updateRestRing(){ const arc=$("#rtArc"); if(!arc||!restTotal) return; const size=240,stroke=12,r=(size-stroke)/2,c=2*Math.PI*r; arc.style.strokeDashoffset=(c*(1-Math.max(0,restRemain)/restTotal)).toFixed(1); }
function openRest(seconds, nextLabelHtml){
  restTotal=seconds; restRemain=seconds;
  const ov=$("#restOverlay");
  ov.innerHTML=`
    <div class="rt-label">Rest</div>
    <div class="rt-ring">${restRingSvg()}<div class="rt-time" id="rtTime">${fmtClock(seconds)}</div></div>
    <div class="rt-next">${nextLabelHtml||""}</div>
    <div class="rt-controls">
      <button class="btn sm" data-rt="-15">−15s</button>
      <button class="btn primary" data-rt="skip">Skip rest</button>
      <button class="btn sm" data-rt="15">+15s</button>
    </div>`;
  ov.classList.add("show");
  ov.querySelectorAll('[data-rt]').forEach(b=>b.onclick=()=>{
    const v=b.dataset.rt; if(v==="skip") return closeRest();
    restRemain=Math.max(0, restRemain + (+v)); if(restRemain>restTotal) restTotal=restRemain;
    const t=$("#rtTime"); if(t) t.textContent=fmtClock(Math.max(0,restRemain));
    updateRestRing(); if(restRemain<=0) closeRest();
  });
  clearInterval(restTimer);
  restTimer=setInterval(()=>{
    restRemain-=1;
    const t=$("#rtTime"); if(t) t.textContent=fmtClock(Math.max(0,restRemain));
    updateRestRing();
    if(restRemain<=0){ haptic(40); closeRest(); }
  },1000);
  requestAnimationFrame(updateRestRing);
}
function closeRest(){ clearInterval(restTimer); restTimer=null; const ov=$("#restOverlay"); ov.classList.remove("show"); setTimeout(()=>{ if(!ov.classList.contains("show")) ov.innerHTML=""; },320); }

function nextLabel(exA, si){

  const idx=S.active.exercises.indexOf(exA); const ne=S.active.exercises[idx+1];
  if(ne) return `Next exercise · <b>${esc(EX_BY_ID[ne.id].name)}</b>`;
  return `Last set — <b>finish strong</b>`;
}
function nextExerciseCard(exA){ const idx=S.active.exercises.indexOf(exA); for(let i=idx+1;i<S.active.exercises.length;i++){ const e=S.active.exercises[i]; const done=e.sets.filter(s=>s.kind==="work").every(s=>s.done); if(!done) return $("#excard-"+e.id); } return null; }

function bindSession(){
  startSessionTimer();

  });
  $$('#view .set-check[data-check]').forEach(btn=>btn.addEventListener('click',()=>{
    const row=btn.closest('.set-row'); const id=row.dataset.ex, si=+row.dataset.si;
    const exA=S.active.exercises.find(x=>x.id===id); const s=exA.sets[si]; const ex=EX_BY_ID[id];

function tryFinish(){
  const {doneSets,totalSets}=sessionTotals();
  if(doneSets===0){ toast("Complete at least one working set first","⚠️"); return; }
  if(doneSets<totalSets){ confirmModal({title:"Finish session?", desc:`You've logged ${doneSets} of ${totalSets} sets. Unlogged sets won't be counted toward your stats.`, confirm:"Finish & log", onConfirm:finishSession}); }
  else finishSession();
}

function finishSession(){
  const a=S.active; if(!a) return;
  closeRest(); stopSessionTimer();
  const date=dkey();
  let totalVol=0,totalReps=0,totalSets=0;
  const prsNew=[], levelUps=[], readyUps=[];
  const prevRankIdx=levelInfo(S.xp).index;

  a.exercises.forEach(exA=>{
    const ex=EX_BY_ID[exA.id];
    const logged=exA.sets.filter(s=>s.kind==="work" && s.done && (+s.reps>0));
    if(!logged.length) return;
    let top=0,bestE=0,vol=0,allTop=true; const setRecs=[];
    logged.forEach(s=>{
      const wt=ex.bodyweight?0:(+s.weight||0); const rp=+s.reps||0;
      const v = ex.unit==="sec"?0:wt*rp;
      vol+=v; if(ex.unit!=="sec") totalReps+=rp; totalSets++;
      if(wt>top) top=wt;
      const e=epley(wt,rp); if(e>bestE) bestE=e;
      if(rp<ex.repMax) allTop=false;
      setRecs.push({w:wt,r:rp});
    });
    totalVol+=vol;
    const prev=lastLogFor(exA.id); const prevTop=prev?prev.topWeight:0;
    (S.logs[exA.id]=S.logs[exA.id]||[]).push({date, sets:setRecs, topWeight:top, e1rm:Math.round(bestE), volume:Math.round(vol), allTop});
    const curPr=S.prs[exA.id];
    if(!ex.bodyweight && bestE>0 && (!curPr || bestE>curPr.e1rm+0.01)){
      const prReps=setRecs.reduce((m,s)=>s.w===top?Math.max(m,s.r):m,0);
      S.prs[exA.id]={weight:top, reps:prReps, e1rm:Math.round(bestE), date};
      prsNew.push({id:exA.id, name:ex.name, e1rm:Math.round(bestE), weight:top, reps:prReps});
    }
    if(!ex.bodyweight && top>0 && prevTop>0 && top>prevTop){
      levelUps.push({id:exA.id, name:ex.name, from:prevTop, to:top});
      S.progressionEvents=(S.progressionEvents||0)+1;
    }
    if(allTop && top>0 && !ex.bodyweight && prev) readyUps.push({id:exA.id, name:ex.name, next:top+suggestIncrement(ex)});
  });

  const durationSec=Math.round((Date.now()-a.startedAt)/1000);
  const streakBonus=Math.min((S.streak.current||0)*5,60);
  const xpGain=totalSets*8 + 60 + prsNew.length*40 + levelUps.length*25 + streakBonus;
  const sess={ id:uid(), key:a.key, group:a.group, name:a.name, letter:a.letter, date, startedAt:a.startedAt, durationSec, sets:totalSets, reps:totalReps, volume:Math.round(totalVol), xp:xpGain, prs:prsNew.map(p=>p.name), levelUps:levelUps.map(l=>l.name) };
  S.sessions.push(sess);
  S.totals.workouts++; S.totals.sets+=totalSets; S.totals.reps+=totalReps; S.totals.volume+=totalVol;
  updateStreakOnFinish(date);
  addXP(xpGain,{silent:true});
  S.active=null;
  const rankNow=levelInfo(S.xp);
  const rankUp = rankNow.index>prevRankIdx ? rankNow : null;
  const unlocked=checkAchievements({silent:true});
  saveNow();
  inSession=false; CURRENT="today";
  showSplash({sess, prsNew, levelUps, readyUps, rankUp, unlocked, xpGain, streakBonus});
}

function addXP(n, opts={}){ S.xp=(S.xp||0)+Math.max(0,Math.round(n)); if(!opts.silent) save(); }
function updateStreakOnFinish(date){
  const last=S.streak.last;
  if(!last){ S.streak.current=1; }
  else{ const gap=daysBetween(last,date);
    if(gap<=0){ /* same day */ }
    else if(gap<=3){ S.streak.current=(S.streak.current||0)+1; }
    else{ if(gap>=7) S.flags.comeback=true; S.streak.current=1; }
  }
  S.streak.last=date;
  S.streak.longest=Math.max(S.streak.longest||0, S.streak.current||0);
  updateStreakChip();
}
function updateStreakChip(){ const n=$("#streakNum"); if(n) n.textContent=S.streak.current||0; const chip=$("#streakChip"); if(chip) chip.classList.toggle("cold",(S.streak.current||0)===0); }

function chartEmpty(msg="Log at least 2 sessions to see this trend"){ return `<div class="chart-empty">${icon("stats")}<div>${esc(msg)}</div></div>`; }
function lineChart(series, {fmt=fmtVol}={}){
  if(!series || series.length<2) return chartEmpty();
  const W=700,H=240,padL=46,padR=14,padT=14,padB=30;
  const xs=series.length, vals=series.map(s=>s.value);
  let max=Math.max(...vals), min=Math.min(...vals,0); if(max===min) max=min+1;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const X=i=> padL + (xs===1?plotW/2:(i/(xs-1))*plotW);
  const Y=v=> padT + plotH - ((v-min)/(max-min))*plotH;
  const pts=series.map((s,i)=>[X(i),Y(s.value)]);
  const line=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
  const area=`M${pts[0][0].toFixed(1)} ${(padT+plotH).toFixed(1)} `+pts.map(p=>"L"+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ")+` L${pts[xs-1][0].toFixed(1)} ${(padT+plotH).toFixed(1)} Z`;
  const grid=[0,0.25,0.5,0.75,1].map(t=>{ const v=min+(max-min)*(1-t); const y=padT+plotH*t; return `<line class="chart-grid-line" x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}"/><text class="chart-axis-label" x="${padL-7}" y="${(y+3).toFixed(1)}" text-anchor="end">${fmt(v)}</text>`; }).join("");
  const xlIdx=[...new Set([0,Math.floor((xs-1)/2),xs-1])];
  const xl=xlIdx.map(i=>`<text class="chart-axis-label" x="${X(i).toFixed(1)}" y="${H-9}" text-anchor="middle">${esc(series[i].label)}</text>`).join("");
  const dots=pts.map(p=>`<circle class="chart-dot" cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3.4"/>`).join("");
  return `<div class="chart-box"><svg viewBox="0 0 ${W} ${H}">
    <defs><linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--accent)" stop-opacity="0.30"/><stop offset="1" stop-color="var(--accent)" stop-opacity="0"/></linearGradient></defs>
    ${grid}<path class="chart-area" d="${area}"/><path class="chart-line" d="${line}"/>${dots}${xl}
  </svg></div>`;
}

function sparkline(values, w=260, h=44){
  if(values.length<2) return "";
  let max=Math.max(...values), min=Math.min(...values); if(max===min) max+=1;
  const pts=values.map((v,i)=>[ (i/(values.length-1))*(w-4)+2, h-3 - ((v-min)/(max-min))*(h-6) ]);
  const d=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
  return `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><path d="${d}" fill="none" stroke="var(--accent)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}
function downscaleImage(dataUrl, maxDim, cb){
  const img=new Image();
  img.onload=()=>{ let w=img.width,h=img.height; const scale=Math.min(1,maxDim/Math.max(w,h)); w=Math.round(w*scale); h=Math.round(h*scale);
    const c=document.createElement("canvas"); c.width=w; c.height=h; c.getContext("2d").drawImage(img,0,0,w,h);
    try{ cb(c.toDataURL("image/jpeg",0.82)); }catch(e){ cb(dataUrl); } };
  img.onerror=()=>cb(dataUrl); img.src=dataUrl;
}

function exportData(){
  try{
    const blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob); const a=document.createElement("a");
    a.href=url; a.download=`paragon-backup-${dkey()}.json`; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000); toast("Backup downloaded","📥","success");

function importData(text){
  let data; try{ data=JSON.parse(text); }catch(e){ toast("Invalid backup file","⚠️"); return; }
  if(!data || typeof data!=="object" || !("sessions" in data || "xp" in data)){ toast("This doesn't look like a PARAGON backup","⚠️"); return; }
  confirmModal({title:"Import this backup?", desc:"Your current data will be replaced with the contents of this file.", confirm:"Import", onConfirm:()=>{
    S=Object.assign(defaultState(), data);
    S.profile=Object.assign(defaultState().profile,data.profile||{});
    S.settings=Object.assign(defaultState().settings,data.settings||{});
    S.goals=Object.assign(defaultState().goals,data.goals||{});
    S.totals=Object.assign(defaultState().totals,data.totals||{});
    S.streak=Object.assign(defaultState().streak,data.streak||{});
    S.flags=Object.assign(defaultState().flags,data.flags||{});
    saveNow(); applyTheme(S.settings.theme); applyAccent(S.settings.accent); CURRENT="hero"; updateStreakChip(); renderNav(); renderView(); toast("Backup restored","✓","success");
  }});
}

function bindGlobal(){
  const sc=$("#streakChip");
  if(sc){ sc.addEventListener("click",()=>go("stats")); sc.addEventListener("keydown",e=>{ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go("stats"); } }); }
  const sb=$("#searchTopBtn"); if(sb) sb.addEventListener("click",openSearch);
  const scrim=$("#modalScrim"); if(scrim) scrim.addEventListener("click",e=>{ if(e.target===scrim) closeModal(); });
  const ro=$("#restOverlay"); if(ro) ro.addEventListener("click",e=>{ if(e.target===ro) closeRest(); });

  document.addEventListener("keydown",e=>{
    const tag=(e.target.tagName||"").toLowerCase();
    const typing= tag==="input"||tag==="textarea"||tag==="select"||e.target.isContentEditable;
    if(e.key==="Escape"){
      if($("#restOverlay").classList.contains("show")) return closeRest();
      if($("#splash").classList.contains("show")) return closeSplash();
      if(modalOpen) return closeModal();
      if(typing) e.target.blur();
      return;
    }
    if(typing) return;
    if(e.key==="/"){ e.preventDefault(); openSearch(); return; }
    if(modalOpen||$("#splash").classList.contains("show")) return;
    if(!inSession && /^[1-5]$/.test(e.key)){ go({1:"today",2:"train",3:"stats",4:"body",5:"hero"}[e.key]); }
  });
}

   PWA · installable, self-contained, offline
   ========================================================================= */
function injectPWA(){
  const ICON_SVG='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">'
    +'<defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FFD56B"/><stop offset="1" stop-color="#F5A524"/></linearGradient></defs>'
    +'<rect width="100" height="100" rx="22" fill="#0a0d18"/>'
    +'<path d="M50 15 L79 25 V50 C79 69 66 81 50 87 C34 81 21 69 21 50 V25 Z" fill="none" stroke="url(#g)" stroke-width="3.5"/>'
    +'<path d="M50 32 L57.5 47 L73 49.2 L61.5 60.4 L64.5 76 L50 68.5 L35.5 76 L38.5 60.4 L27 49.2 L42.5 47 Z" fill="url(#g)"/>'
    +'</svg>';
  let iconUri; try{ iconUri="data:image/svg+xml;base64,"+btoa(ICON_SVG); }catch(e){ iconUri="data:image/svg+xml;utf8,"+encodeURIComponent(ICON_SVG); }
  // apple touch icon + favicon
  const ai=document.createElement("link"); ai.rel="apple-touch-icon"; ai.href=iconUri; document.head.appendChild(ai);
  const fav=document.createElement("link"); fav.rel="icon"; fav.type="image/svg+xml"; fav.href=iconUri; document.head.appendChild(fav);
  const manifest={
    name:"PARAGON — Hero Training System", short_name:"PARAGON",
    description:"Forge a hero. A premium training, analytics and habit system.",
    start_url:".", scope:".", display:"standalone", orientation:"portrait",
    background_color:"#0a0d18", theme_color:"#0a0d18",
    icons:[{src:iconUri, sizes:"512x512", type:"image/svg+xml", purpose:"any maskable"},
           {src:iconUri, sizes:"192x192", type:"image/svg+xml", purpose:"any"}]
  };
  try{
    const blob=new Blob([JSON.stringify(manifest)],{type:"application/manifest+json"});
    const link=document.createElement("link"); link.rel="manifest"; link.href=URL.createObjectURL(blob); document.head.appendChild(link);
  }catch(e){}
}

    if(app) app.classList.remove("hidden");

}

/* ---- COMIC HERO EMBLEM (shield + star, charge ring) ---- */
function crestMarkup(charge=0, idp="c"){
  const c=clamp(charge,0,1); const R=46, circ=2*Math.PI*R;
  return `
  <circle cx="50" cy="50" r="${R}" fill="none" stroke="rgba(0,0,0,.22)" stroke-width="7"/>
  <circle cx="50" cy="50" r="${R}" fill="none" stroke="var(--yellow)" stroke-width="7" stroke-linecap="round"
    stroke-dasharray="${circ}" stroke-dashoffset="${circ*(1-c)}" transform="rotate(-90 50 50)" style="transition:stroke-dashoffset 1s var(--ease)"/>
  <path d="M50 15 L79 27 V51 C79 70 65 83 50 89 C35 83 21 70 21 51 V27 Z" fill="var(--accent)" stroke="var(--line)" stroke-width="4" stroke-linejoin="round"/>
  <path d="M50 29 L58 47 L76 49 L62.5 61.5 L66 79 L50 70 L34 79 L37.5 61.5 L24 49 L42 47 Z" fill="var(--yellow)" stroke="var(--line)" stroke-width="3.4" stroke-linejoin="round"/>
  `;
}

/* ---- COMIC POWER DIAL (ring) ---- */
function ringSvg(pct, size=72, stroke=8, label=""){
  pct=clamp(pct,0,1);
  const r=(size-stroke)/2-2, c=2*Math.PI*r, off=c*(1-pct);
  return `<div class="ring-wrap" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${(size-stroke)/2-1}" fill="var(--bubble)" stroke="var(--line)" stroke-width="3"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--paper-2)" stroke-width="${stroke}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--accent)" stroke-width="${stroke}" stroke-linecap="round"
        stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dashoffset .9s var(--ease)"/>
    </svg>
    <div class="ring-center"><div class="pct">${Math.round(pct*100)}<small>%</small></div>${label?`<div class="pl">${label}</div>`:""}</div>
  </div>`;
}

/* ---- COMIC SOUND EFFECTS ---- */
const SFX_WORDS=["POW!","BAM!","WHAM!","BOOM!","ZAP!","KAPOW!","SMASH!","KRAK!","BIFF!"];
function popSFX(text, x, y, color){
  if(matchMedia("(prefers-reduced-motion:reduce)").matches) return;
  let layer=$("#sfx-layer");
  if(!layer){ layer=document.createElement("div"); layer.id="sfx-layer"; document.body.appendChild(layer); }
  const el=document.createElement("div"); el.className="sfx"; el.textContent=text||pick(SFX_WORDS);
  el.style.left=(x!=null?x:innerWidth/2)+"px"; el.style.top=(y!=null?y:innerHeight/2)+"px";
  el.style.setProperty("--rot",((Math.random()*16-8)|0)+"deg");
  if(color) el.style.color=color;
  layer.appendChild(el); setTimeout(()=>el.remove(),760);
}
/* fire a POW when a working set is completed */
document.addEventListener("click",e=>{
  const c=e.target.closest ? e.target.closest(".set-check[data-check]") : null;
  if(c && c.classList.contains("checked")){
    const r=c.getBoundingClientRect();
    popSFX(pick(SFX_WORDS), r.left+r.width/2, r.top+r.height/2);
  }
});
